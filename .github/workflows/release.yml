name: Release

"on":
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  semantic-release:
    name: Semantic Release
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.release.outputs.released }}
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --group dev

      - name: Debug git state
        run: |
          echo "=== Tags ==="
          git tag -l
          echo "=== Branch ==="
          git branch -v
          echo "=== Last 12 commits ==="
          git log --oneline -12
          echo "=== semantic-release --print ==="
          uv run semantic-release version --print || echo "print failed"

      - name: Run semantic-release
        id: release
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          BEFORE=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
          uv run semantic-release -vv version --changelog --push
          AFTER=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
          if [ "$BEFORE" != "$AFTER" ]; then
            echo "released=true" >> $GITHUB_OUTPUT
            echo "tag=$AFTER" >> $GITHUB_OUTPUT
          else
            echo "released=false" >> $GITHUB_OUTPUT
          fi

  publish:
    name: Publish to PyPI
    needs: semantic-release
    if: needs.semantic-release.outputs.released == 'true'
    uses: ./.github/workflows/pypi.yml
    with:
      tag: ${{ needs.semantic-release.outputs.tag }}
    permissions:
      id-token: write
      contents: read

  docker:
    name: Publish Docker images
    needs: semantic-release
    if: needs.semantic-release.outputs.released == 'true'
    uses: ./.github/workflows/docker.yml
    with:
      tag: ${{ needs.semantic-release.outputs.tag }}
    permissions:
      contents: read
      packages: write
