name: Docker

"on":
  pull_request:
    branches:
      - main
  workflow_call:
    inputs:
      tag:
        description: 'Release tag to build and publish (e.g. v1.2.3)'
        required: true
        type: string

permissions: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        distro: [alpine, debian]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.sha }}
          fetch-depth: 0

      - name: Log in to the Container registry
        if: github.event_name == 'workflow_call'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=pr,suffix=-${{ matrix.distro }}
            type=semver,pattern={{version}}-${{ matrix.distro }},value=${{ inputs.tag }},enable=${{ github.event_name == 'workflow_call' }}
            type=semver,pattern={{major}}.{{minor}}-${{ matrix.distro }},value=${{ inputs.tag }},enable=${{ github.event_name == 'workflow_call' }}
            type=raw,value=latest-${{ matrix.distro }},enable=${{ github.event_name == 'workflow_call' }}
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_call' && matrix.distro == 'debian' }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          platforms: linux/amd64,linux/arm64

      - name: Build ${{ matrix.distro }} image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.${{ matrix.distro }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'workflow_call' }}
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
