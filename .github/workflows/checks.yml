name: "Lint & Test"

"on":
  push:
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run Ruff lint
        run: uv run ruff check .

      - name: Run Ruff format check
        run: uv run ruff format --check .

  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run python -m unittest discover tests -v

  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests with coverage
        run: uv run coverage run --source=kea_exporter -m unittest discover tests -v

      - name: Report coverage
        run: uv run coverage report -m --fail-under=80

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: .coverage
          retention-days: 90
